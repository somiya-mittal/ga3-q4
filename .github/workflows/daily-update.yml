name: Daily Update by 24f2002516@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 12:00 UTC (specific time, not wildcard)
  workflow_dispatch:      # Lets you test manually right away

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 24f2002516@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > status.txt

      - name: Commit changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "24f2002516@ds.study.iitm.ac.in"
          git add status.txt
          git commit -m "Daily update: $(date -u)"
          git push
