name: Daily Update by 24f2002516@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # Key fix: Allows GITHUB_TOKEN to commit/push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true  # Ensures token available for push

      - name: Update status file by 24f2002516@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > status.txt

      - name: Commit changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "24f2002516@ds.study.iitm.ac.in"
          git add status.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
